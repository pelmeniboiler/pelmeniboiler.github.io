<!-- /modules/start-menu-module.html -->
<!-- This file contains only the HTML for the start menu. -->
<div class="start-menu">
    <div class="start-button">
        <img src="/logo/shzh.svg" id="start-menu-logo" alt="logo"/>
        <span data-key="start_menu_btn">program.launcher</span>
    </div>
    <ul class="window-list"></ul>
</div>
<!-- Tray (wide screens): THE program launcher. ShZh mark on the left, closed
     windows dock as icons, settings pinned before the live zmanim clock.
     The start-menu box remains for narrow screens only. -->
<div id="tray" class="tray">
    <a id="tray-logo" class="tray-logo" href="/" title="pelmeniboiler"><img id="tray-logo-img" src="/logo/shzh.svg" alt="ש-Ж"></a>
    <ul id="tray-icons"></ul>
    <button id="tray-settings" class="tray-icon" title="system.settings"><span class="symbol">⚙</span></button>
    <button id="tray-clock" title="shaon.zmanim"></button>
</div>

<!-- Zmanim clock window (opened from the tray clock). Counterclockwise dial in
     homage to Chaykin's Decalogue: Hebrew hour letters, hands run right-to-left,
     time in sha'ot zmaniyot with chalakim (1/1080 hour) and regaim (1/76 chelek). -->
<div id="zman-clock-window" class="window init-closed" style="top: 16%; left: 32%; z-index: var(--z-window-active);">
    <div class="title-bar">
        <span class="title" data-key="win_zman_title"><span class="symbol">🕰</span> shaon.zmanim</span>
        <button class="close-btn">&times;</button>
    </div>
    <div class="content zman-content">
        <svg id="zman-dial" viewBox="-110 -110 220 220" aria-label="zmanim clock dial">
            <circle r="104" class="zman-rim"/>
            <g id="zman-marks"></g>
            <g id="zman-letters"></g>
            <!-- Chronograph-style subdials: chalakim (one turn per zmanit hour)
                 and regaim (one turn per chelek). Counterclockwise, like the dial. -->
            <g class="zman-subdial" transform="translate(-40,34)">
                <circle r="20"/>
                <line id="zman-sub-ch" x1="0" y1="0" x2="0" y2="-15"/>
                <text y="33" text-anchor="middle" class="zman-subcap">ח</text>
            </g>
            <g class="zman-subdial" transform="translate(40,34)">
                <circle r="20"/>
                <line id="zman-sub-rg" x1="0" y1="0" x2="0" y2="-15"/>
                <text y="33" text-anchor="middle" class="zman-subcap">ר</text>
            </g>
            <text id="zman-daynight" y="-38" text-anchor="middle" class="zman-symbol"></text>
            <line id="zman-hand" x1="0" y1="0" x2="0" y2="-78" class="zman-hand"/>
            <circle r="4" class="zman-hub"/>
        </svg>
        <div class="zman-readouts">
            <div class="zman-big"><span id="zman-hour">–</span></div>
            <div class="zman-units">
                <span><span data-key="zman_chalakim_label">chalakim</span> <b id="zman-chalakim">–</b></span>
                <span><span data-key="zman_regaim_label">regaim</span> <b id="zman-regaim">–</b></span>
            </div>
            <div class="zman-date" id="zman-hebdate">–</div>
            <div class="zman-sun">
                <span title="sunrise">🌅 <span id="zman-sunrise">–</span></span>
                <span title="sunset">🌇 <span id="zman-sunset">–</span></span>
            </div>
            <div class="zman-loc">
                <span id="zman-loc-label">ירושלים</span>
                <button id="zman-geo" class="normal-btn" title="Use this device's location">📍</button>
            </div>
        </div>
    </div>
</div>
