<!-- /modules/start-menu-module.html -->
<!-- This file contains only the HTML for the start menu. -->
<div class="start-menu">
    <div class="start-button">
        <img src="/logo/shzh.svg" id="start-menu-logo" alt="logo"/>
        <span data-key="start_menu_btn">program.launcher</span>
    </div>
    <ul class="window-list"></ul>
</div>
<!-- Tray (wide screens): windows that started open dock here as icons when
     closed, beside an Anno Mundi clock (Japanese era on ja pages).
     Populated by start-menu.js. -->
<div id="tray" class="tray">
    <ul id="tray-icons"></ul>
    <span id="tray-clock"></span>
</div>
