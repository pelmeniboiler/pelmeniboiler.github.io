<!-- /modules/settings-module.html -->
<!-- This file contains only the HTML for the unified settings window. -->
<div id="settings-main-window" class="window settings-window init-closed" style="top: 25%; left: 25%; width: 50%; max-width: 600px; height: 400px; z-index: var(--z-window-active);">
    <div class="title-bar">
        <span class="title" data-key="win_settings_title">🛠 system.settings</span>
        <button class="close-btn">&times;</button>
    </div>
    <div class="settings-container">
        <nav class="settings-nav">
            <ul>
                <li data-target="language" class="active" data-key="settings_nav_lang">Language</li>
                <li data-target="theme" data-key="settings_nav_theme">Appearance</li>
                <li data-target="info" data-key="settings_nav_info">Information</li>
            </ul>
        </nav>
        <main class="settings-content">
            <!-- Language Page -->
            <div id="settings-page-language" class="settings-page active">
                <h3 data-key="lang_select_label">Select Language</h3>
                <div id="language-select-custom" class="custom-dropdown">
                    <button class="custom-dropdown-toggle" type="button">
                        <span id="language-select-value">English</span>
                        <span class="custom-dropdown-arrow">▼</span>
                    </button>
                    <div class="custom-dropdown-menu">
                        <a href="#" class="custom-dropdown-item" data-value="en">English</a>
                        <a href="#" class="custom-dropdown-item" data-value="he">עברית (Hebrew)</a>
                        <a href="#" class="custom-dropdown-item" data-value="ru">Русский (Russian)</a>
                        <a href="#" class="custom-dropdown-item" data-value="de">Deutsch (German)</a>
                        <a href="#" class="custom-dropdown-item" data-value="ja">日本語 (Japanese)</a>
                        <a href="#" class="custom-dropdown-item" data-value="gt"> (English)</a>
                    </div>
                </div>
            </div>

            <!-- Appearance Page -->
            <div id="settings-page-theme" class="settings-page">
                <h3 data-key="theme_title">Display Theme</h3>
                <div class="setting-group-inline">
                    <input type="checkbox" id="eink-toggle" class="checkbox">
                    <label for="eink-toggle" data-key="theme_eink_label">E-Ink Mode</label>
                </div>
                <div class="setting-group-inline">
                    <input type="checkbox" id="gallery-toggle" class="checkbox">
                    <label for="gallery-toggle" data-key="theme_gallery_label">Gallery Background</label>
                </div>
                <hr class="setting-divider">
                <div class="setting-group" id="theme-setting-group">
                    <label class="radio-label"><input type="radio" name="theme" value="light"><span class="symbol">☼</span> <span data-key="theme_light_label">Light</span></label>
                    <label class="radio-label"><input type="radio" name="theme" value="dark"><span class="symbol">☾</span> <span data-key="theme_dark_label">Dark</span></label>
                    <hr class="setting-divider">
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="funky"><span class="symbol">🕺</span> <span data-key="theme_funky_label">Funky</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="champagne"><span class="symbol">🥂</span> <span data-key="theme_champagne_label">Champagne</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="bubblegum"><span class="symbol">🍬</span> <span data-key="theme_bubblegum_label">Bubblegum</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="techelet"><span class="symbol">🌊</span> <span data-key="theme_techelet_label">Techelet</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="zelyonny"><span class="symbol">🌲</span> <span data-key="theme_zelyonny_label">Zelyonny</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="akai"><span class="symbol">👹</span> <span data-key="theme_akai_label">Akai</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="rindswurst"><span class="symbol">🥩</span> <span data-key="theme_rindswurst_label">Rindswurst</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="tapuz"><span class="symbol">🍊</span> <span data-key="theme_tapuz_label">Tapuz</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="kfor"><span class="symbol">❄</span> <span data-key="theme_kfor_label">Kfor</span></label>
                    <label class="radio-label color-theme"><input type="radio" name="theme" value="zikit"><span class="symbol">🦎</span> <span data-key="theme_zikit_label">Zikit</span></label>
                </div>
            </div>

            <!-- Information Page -->
            <div id="settings-page-info" class="settings-page">
                <h3 data-key="info_title">Copyright & Licensing</h3>
                <p data-key="info_p1">All photographic works...</p>
                <p data-key="info_p2">Reproduction, distribution...</p>
                <p data-key="info_p3">All other content...</p>
                <p data-key="info_p4">Font...</p>
                <hr class="setting-divider">
                <button id="reset-site-btn" class="normal-btn" title="Clear saved settings, offline cache, and service worker, then reload. Use if the site gets stuck.">
                    <span class="symbol">⟲</span> reset.everything
                </button>
            </div>
        </main>
    </div>
</div>
