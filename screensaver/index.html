    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg-color); cursor: none; }
        :root { --ss-mid: color-mix(in srgb, var(--text-color) 50%, var(--bg-color)); }
        #hint { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 9;
            font-family: var(--font-body, serif); font-size: 12px; color: var(--text-color); opacity: 0.5;
            letter-spacing: 1px; user-select: none; }

        /* LCD: a slow 3D-extruded ShZh, tumbling and drifting. */
        .scene { position: fixed; inset: 0; perspective: 900px; display: grid; place-items: center; }
        #drifter { will-change: transform; }
        #extrude { position: relative; width: 230px; height: 230px; transform-style: preserve-3d; animation: ss-spin 30s linear infinite; }
        @keyframes ss-spin { from { transform: rotateX(-15deg) rotateY(0deg); } to { transform: rotateX(-15deg) rotateY(360deg); } }
        #extrude .layer { position: absolute; inset: 0; }
        #extrude .glyph { width: 100%; height: 100%; display: block; }

        /* E-INK: a dithered gradient, a gingham field of shins/zhes/shzhs sliding
           diagonally beneath the text, a single-line title, a bottom-quarter subtitle. */
        #poster { position: fixed; inset: 0; }
        #dither { position: absolute; inset: 0; width: 100%; height: 100%; }
        #field { position: absolute; inset: 0; width: 100%; height: 100%; }
        #field use { fill: var(--bg-color); }        /* the pattern reads as the page colour */
        .ss-title { position: absolute; top: 7%; left: 6%; right: 6%; font-family: var(--font-body, serif);
            font-weight: 700; font-size: clamp(26px, 5.2vw, 60px); line-height: 1; color: var(--text-color);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: lowercase; }
        .ss-sub { position: absolute; bottom: 5%; left: 6%; right: 6%; font-family: var(--font-body, serif);
            font-size: clamp(13px, 1.8vw, 20px); letter-spacing: 2px; color: var(--bg-color); }

        body.mode-lcd #poster { display: none; }
        body.mode-eink .scene { display: none; }
    </style>

    <div id="hint">click or press any key to exit</div>

    <script>
    (function () {
        const eink = document.documentElement.classList.contains("eink-mode");
        document.body.classList.add(eink ? "mode-eink" : "mode-lcd");
        const css = getComputedStyle(document.body);
        const rgb = (s) => (s.match(/\d+/g) || [0,0,0]).map(Number).slice(0,3);
        const text = rgb(css.color), bg = rgb(css.backgroundColor);
        const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (!eink) {
            const ex = document.getElementById("extrude"), N = 16, depth = 2.3;
            for (let i = N - 1; i >= 0; i--) {
                const layer = document.createElement("div");
                layer.className = "layer";
                layer.style.transform = "translateZ(" + (-i * depth) + "px)";
                layer.innerHTML = "<svg class=\"glyph\" viewBox=\"0 0 800 800\"><use href=\"#shzh\"/></svg>";
                layer.querySelector(".glyph").style.fill = i === 0 ? "var(--text-color)" : "var(--ss-mid)";
                ex.appendChild(layer);
            }
            const drifter = document.getElementById("drifter");
            let t = Math.random() * 10;
            (function drift() {
                t += 0.005;
                drifter.style.transform = "translate(" + (Math.sin(t * 0.7) * innerWidth * 0.30).toFixed(1) + "px," + (Math.cos(t * 0.9) * innerHeight * 0.30).toFixed(1) + "px)";
                requestAnimationFrame(drift);
            })();
        } else {
            const cv = document.getElementById("dither");
            const w = cv.width = innerWidth, h = cv.height = innerHeight, ctx = cv.getContext("2d");
            const B = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
            const img = ctx.createImageData(w, h);
            for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
                const on = (0.12 + 0.76 * (y / h)) > (B[y & 3][x & 3] + 0.5) / 16;
                const c = on ? text : bg, i = (y * w + x) * 4;
                img.data[i] = c[0]; img.data[i+1] = c[1]; img.data[i+2] = c[2]; img.data[i+3] = 255;
            }
            ctx.putImageData(img, 0, 0);
            // Slide the gingham diagonally, infinitely, beneath the text (motion-ok only).
            if (!reduce) {
                const pat = document.getElementById("gingham");
                let o = 0;
                (function slide() { o -= 0.25; pat.setAttribute("patternTransform", "translate(" + o.toFixed(2) + " " + o.toFixed(2) + ")"); requestAnimationFrame(slide); })();
            }
        }

        const exit = () => { location.href = "/"; };
        addEventListener("click", exit);
        addEventListener("keydown", exit);
    })();
    </script>
