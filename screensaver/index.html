<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>◈ screensaver</title>
    <link rel="icon" href="/logo/favicon.svg">
    <script src="/scripts/theme-loader.js"></script>
    <link rel="stylesheet" href="/styles/pelmeni2025.css">
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg-color); cursor: none; }
        #hint { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 99;
            font-family: var(--font-body, serif); font-size: 12px; color: var(--text-color); opacity: 0.5;
            letter-spacing: 1px; user-select: none; }

        /* --- LCD: 25 logo.canvas windows bouncing around --- */
        #lcd-field { position: fixed; inset: 0; }
        .ss-logo { position: fixed; top: 0; left: 0; width: 132px; will-change: transform; }
        .ss-logo .title-bar { height: 22px; font-size: 12px; }
        .ss-logo-body { padding: 8px; display: flex; justify-content: center; }
        .ss-logo-body img { width: 62px; height: 62px; }

        /* --- E-INK: dithered gradient + gingham field of real shins/zhes/shzhs
               (from the font), a single-line title in the bottom quarter --- */
        #poster { position: fixed; inset: 0; }
        #dither { position: absolute; inset: 0; width: 100%; height: 100%; }
        #field { position: absolute; inset: 0; width: 100%; height: 100%; }
        #field text { fill: var(--bg-color); font-family: 'FrankRuhl', 'Times New Roman', serif; }
        .ss-title { position: absolute; left: 0; right: 0; bottom: 0; height: 25%;
            display: flex; align-items: center; padding: 0 5%; color: var(--bg-color);
            font-family: var(--font-body, serif); font-weight: 700; line-height: 1;
            font-size: clamp(24px, 5.4vw, 58px); white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; text-transform: lowercase; }

        body.mode-lcd #poster { display: none; }
        body.mode-eink #lcd-field { display: none; }
    </style>
</head>
<body>
    <div id="lcd-field"></div>

    <div id="poster">
        <canvas id="dither"></canvas>
        <svg id="field"><defs>
            <pattern id="gingham" width="132" height="132" patternUnits="userSpaceOnUse">
                <text x="14" y="56" font-size="46">ש</text>
                <text x="80" y="56" font-size="46">Ж</text>
                <text x="14" y="122" font-size="46">Ж</text>
                <text x="80" y="122" font-size="46">ש</text>
                <text x="44" y="90" font-size="26">ש</text>
                <text x="63" y="90" font-size="26">Ж</text>
                <text x="44" y="24" font-size="26">ש</text>
                <text x="63" y="24" font-size="26">Ж</text>
            </pattern>
        </defs><rect width="100%" height="100%" fill="url(#gingham)"/></svg>
        <div class="ss-title">wendy shoshana zhulkovsky</div>
    </div>

    <div id="hint">click or press any key to exit</div>

    <script>
    (function () {
        const eink = document.documentElement.classList.contains("eink-mode");
        document.body.classList.add(eink ? "mode-eink" : "mode-lcd");
        const reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (!eink) {
            // 25 mini logo.canvas windows caroming off the walls and each other.
            const field = document.getElementById("lcd-field"), N = 25, items = [];
            for (let i = 0; i < N; i++) {
                const el = document.createElement("div");
                el.className = "window ss-logo";
                el.innerHTML = '<div class="title-bar"><span class="title">❈ logo.canvas</span></div><div class="ss-logo-body"><img src="/logo/shzh.svg" alt=""></div>';
                field.appendChild(el);
                const w = el.offsetWidth, h = el.offsetHeight;
                const sp = reduce ? 0 : 2.4;
                items.push({ el, w, h,
                    x: Math.random() * Math.max(1, innerWidth - w),
                    y: Math.random() * Math.max(1, innerHeight - h),
                    vx: (Math.random() * 2 - 1) * sp || 1.6, vy: (Math.random() * 2 - 1) * sp || 1.6 });
                el.style.transform = "translate(" + items[i].x + "px," + items[i].y + "px)";
            }
            if (!reduce) (function step() {
                for (const it of items) {
                    it.x += it.vx; it.y += it.vy;
                    if (it.x <= 0) { it.x = 0; it.vx = Math.abs(it.vx); } else if (it.x + it.w >= innerWidth) { it.x = innerWidth - it.w; it.vx = -Math.abs(it.vx); }
                    if (it.y <= 0) { it.y = 0; it.vy = Math.abs(it.vy); } else if (it.y + it.h >= innerHeight) { it.y = innerHeight - it.h; it.vy = -Math.abs(it.vy); }
                }
                for (let i = 0; i < N; i++) for (let j = i + 1; j < N; j++) {
                    const a = items[i], b = items[j];
                    if (a.x >= b.x + b.w || a.x + a.w <= b.x || a.y >= b.y + b.h || a.y + a.h <= b.y) continue;
                    const ox = Math.min(a.x + a.w - b.x, b.x + b.w - a.x), oy = Math.min(a.y + a.h - b.y, b.y + b.h - a.y);
                    if (ox < oy) { const t = a.vx; a.vx = b.vx; b.vx = t; const s = a.x < b.x ? 1 : -1; a.x -= s * ox / 2; b.x += s * ox / 2; }
                    else { const t = a.vy; a.vy = b.vy; b.vy = t; const s = a.y < b.y ? 1 : -1; a.y -= s * oy / 2; b.y += s * oy / 2; }
                }
                for (const it of items) it.el.style.transform = "translate(" + it.x.toFixed(1) + "px," + it.y.toFixed(1) + "px)";
                requestAnimationFrame(step);
            })();
        } else {
            // Static dithered vertical gradient (Bayer 4x4), text -> bg, top to bottom.
            const css = getComputedStyle(document.body);
            const rgb = (s) => (s.match(/\d+/g) || [0, 0, 0]).map(Number).slice(0, 3);
            const text = rgb(css.color), bg = rgb(css.backgroundColor);
            const cv = document.getElementById("dither");
            const w = cv.width = innerWidth, h = cv.height = innerHeight, ctx = cv.getContext("2d");
            const B = [[0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]];
            const img = ctx.createImageData(w, h);
            for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
                const on = (0.1 + 0.78 * (y / h)) > (B[y & 3][x & 3] + 0.5) / 16;
                const c = on ? text : bg, i = (y * w + x) * 4;
                img.data[i] = c[0]; img.data[i + 1] = c[1]; img.data[i + 2] = c[2]; img.data[i + 3] = 255;
            }
            ctx.putImageData(img, 0, 0);
            // Slide the gingham diagonally, infinitely, beneath the text (motion-ok only).
            if (!reduce) {
                const pat = document.getElementById("gingham");
                let o = 0;
                (function slide() { o -= 0.22; pat.setAttribute("patternTransform", "translate(" + o.toFixed(2) + " " + o.toFixed(2) + ")"); requestAnimationFrame(slide); })();
            }
        }

        const exit = () => { location.href = "/"; };
        addEventListener("click", exit);
        addEventListener("keydown", exit);
    })();
    </script>
</body>
</html>
