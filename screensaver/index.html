        html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg-color); cursor: none; }

            font-family: var(--font-body, sans-serif); font-size: 12px; color: var(--text-color);
            opacity: 0.5; letter-spacing: 1px; user-select: none; }
        #dvd { position: fixed; top: 0; left: 0; width: 132px; will-change: transform; }
        #dvd svg { width: 100%; height: 100%; display: block; }
        #dvd svg path { fill: var(--dvd, var(--text-color)); transition: fill 0.15s; }
        /* Corner-hit celebration: a brief full-screen invert. */
        #flash { position: fixed; inset: 0; background: var(--text-color); opacity: 0; pointer-events: none; }
        #flash.on { animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { opacity: 0.55; } 100% { opacity: 0; } }

    <script>
    (function () {
        const el = document.getElementById("dvd"), flash = document.getElementById("flash");
        // DVD-style colour cycle drawn from the site is theme palette.
        const COLORS = ["#E8590C","#4169E1","#C62828","#3C763D","#DE3163","#D4AF37","#5CB85C","#FF69B4","#87CEEB","#A1887F"];
        let ci = Math.floor(Math.random() * COLORS.length);
        const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
        const speed = reduce ? 0.9 : 1.8;
        let x = Math.random() * (innerWidth - 140), y = Math.random() * (innerHeight - 140);
        let dx = speed * (Math.random() < 0.5 ? 1 : -1), dy = speed * (Math.random() < 0.5 ? 1 : -1);
        el.style.setProperty("--dvd", COLORS[ci]);
        function step() {
            const maxX = innerWidth - el.offsetWidth, maxY = innerHeight - el.offsetHeight;
            x += dx; y += dy;
            let hitX = false, hitY = false;
            if (x <= 0) { x = 0; dx = Math.abs(dx); hitX = true; }
            else if (x >= maxX) { x = maxX; dx = -Math.abs(dx); hitX = true; }
            if (y <= 0) { y = 0; dy = Math.abs(dy); hitY = true; }
            else if (y >= maxY) { y = maxY; dy = -Math.abs(dy); hitY = true; }
            if (hitX || hitY) { ci = (ci + 1) % COLORS.length; el.style.setProperty("--dvd", COLORS[ci]); }
            if (hitX && hitY) { flash.classList.remove("on"); void flash.offsetWidth; flash.classList.add("on"); }
            el.style.transform = "translate(" + x + "px," + y + "px)";
            raf = requestAnimationFrame(step);
        }
        let raf = requestAnimationFrame(step);
        const exit = () => { location.href = "/"; };
        addEventListener("click", exit); addEventListener("keydown", exit);
    })();
    </script>
