<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>◈ screensaver</title>
    <link rel="icon" href="/logo/favicon.svg">
    <script src="/scripts/theme-loader.js"></script>
    <link rel="stylesheet" href="/styles/pelmeni2025.css">
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg-color); cursor: none; }

        /* --- LCD: logo.canvas windows bouncing around (the count scales with the
               screen so small screens get fewer). They're the real logo.canvas
               window — same markup + classes — so the shared .window /
               .logo-image-container rules theme them, ShZh mark included.
               .ss-logo / .ss-exit only take over positioning for the bounce, and
               the exit prompt is itself a bouncing window (not an overlay). --- */
        #lcd-field { position: fixed; inset: 0; }
        .ss-logo, .ss-exit { position: fixed; top: 0; left: 0; margin: 0; will-change: transform; }
        .ss-exit .content { padding: 12px 16px; max-width: 190px; text-align: center;
            font-family: var(--font-body, serif); color: var(--text-color); line-height: 1.3; }

        /* --- E-INK: a random photo, full-screen Floyd–Steinberg dither, with a
               random excerpt from its article and a bg-colour ShZh in the corner. --- */
        #poster { position: fixed; inset: 0; }
        #dither { position: absolute; inset: 0; width: 100%; height: 100%; }
        #ss-caption { position: absolute; left: 0; bottom: 0; margin: 4%; max-width: min(48ch, 58%);
            padding: 14px 18px; background: var(--bg-color); color: var(--text-color);
            font-family: var(--font-body, serif); line-height: 1.4; }
        #ss-caption blockquote { margin: 0; font-size: clamp(15px, 2vw, 22px); }
        #ss-caption figcaption { margin-top: 8px; font-style: italic; font-size: 0.85em; }
        #ss-mark { position: absolute; right: 0; bottom: 0; margin: 3%; width: clamp(56px, 9vw, 104px); }
        #ss-mark svg { width: 100%; height: auto; display: block; }

        body.mode-lcd #poster { display: none; }
        body.mode-eink #lcd-field { display: none; }
    </style>
</head>
<body>
    <div id="lcd-field"></div>

    <div id="poster">
        <canvas id="dither"></canvas>
        <figure id="ss-caption"></figure>
        <div id="ss-mark"></div>
    </div>

    <script>
    (function () {
        const eink = document.documentElement.classList.contains("eink-mode");
        document.body.classList.add(eink ? "mode-eink" : "mode-lcd");
        const reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
        // Everything on this standalone page follows the visitor's saved language
        // (there's no runtime translator here), falling back to English.
        const lang = localStorage.getItem("pelmeniboiler-lang") || document.documentElement.lang || "en";
        const forLang = (byLang) => (byLang && (byLang[lang] || byLang.en)) || null;

        if (!eink) {
            // logo.canvas windows caroming off the walls and each other, plus the
            // exit window. Fewer of them on small screens (~one per 28k px²).
            const field = document.getElementById("lcd-field"), items = [];
            // Saturating curve N = L(1 - e^(-area/A)): a roomy phone lands on a
            // handful, a desktop approaches L, and tiny viewports floor at a single
            // logo (the exit window bounces alongside regardless).
            const N = Math.max(1, Math.round(25 * (1 - Math.exp(-(innerWidth * innerHeight) / 1300000))));

            function step() {
                for (const it of items) {
                    it.x += it.vx; it.y += it.vy;
                    if (it.x <= 0) { it.x = 0; it.vx = Math.abs(it.vx); } else if (it.x + it.w >= innerWidth) { it.x = innerWidth - it.w; it.vx = -Math.abs(it.vx); }
                    if (it.y <= 0) { it.y = 0; it.vy = Math.abs(it.vy); } else if (it.y + it.h >= innerHeight) { it.y = innerHeight - it.h; it.vy = -Math.abs(it.vy); }
                }
                for (let i = 0; i < items.length; i++) for (let j = i + 1; j < items.length; j++) {
                    const a = items[i], b = items[j];
                    if (a.x >= b.x + b.w || a.x + a.w <= b.x || a.y >= b.y + b.h || a.y + a.h <= b.y) continue;
                    const ox = Math.min(a.x + a.w - b.x, b.x + b.w - a.x), oy = Math.min(a.y + a.h - b.y, b.y + b.h - a.y);
                    if (ox < oy) { const t = a.vx; a.vx = b.vx; b.vx = t; const s = a.x < b.x ? 1 : -1; a.x -= s * ox / 2; b.x += s * ox / 2; }
                    else { const t = a.vy; a.vy = b.vy; b.vy = t; const s = a.y < b.y ? 1 : -1; a.y -= s * oy / 2; b.y += s * oy / 2; }
                }
                for (const it of items) it.el.style.transform = "translate(" + it.x.toFixed(1) + "px," + it.y.toFixed(1) + "px)";
                requestAnimationFrame(step);
            }

            const spawn = (cls, inner) => {
                const el = document.createElement("div");
                el.className = "window " + cls;
                el.innerHTML = inner;
                field.appendChild(el);
                const w = el.offsetWidth, h = el.offsetHeight;
                const sp = reduce ? 0 : 2.4;
                const it = { el, w, h,
                    x: Math.random() * Math.max(1, innerWidth - w),
                    y: Math.random() * Math.max(1, innerHeight - h),
                    vx: (Math.random() * 2 - 1) * sp || 1.6, vy: (Math.random() * 2 - 1) * sp || 1.6 };
                items.push(it);
                el.style.transform = "translate(" + it.x + "px," + it.y + "px)";
            };

            const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const build = (mark, ui) => {
                const rtl = lang === "he" ? ' dir="rtl"' : '';
                const logoTitle = ui.logo || '<span class="symbol">❈</span> logo.canvas';
                const exitTitle = esc(ui.exitTitle || "◈ exit.screensaver");
                const exitHint = esc(ui.exitHint || "click or press any key to exit");
                spawn("ss-exit", '<div class="title-bar"><span class="title">' + exitTitle + '</span> <button class="close-btn">&times;</button></div>'
                    + '<div class="content"' + rtl + '>' + exitHint + '</div>');
                for (let i = 0; i < N; i++) {
                    spawn("ss-logo", '<div class="title-bar"><span class="title">' + logoTitle + '</span> <button class="close-btn">&times;</button></div>'
                        + '<div class="content logo-image-container">' + mark + '</div>');
                }
                if (!reduce) requestAnimationFrame(step);
            };

            Promise.all([
                fetch("/logo/shzh.svg").then((r) => r.text()).catch(() => '<img src="/logo/shzh.svg" alt="">'),
                fetch("/screensaver/photos.json").then((r) => r.json()).catch(() => ({})),
            ]).then(([mark, data]) => build(mark, forLang(data.ui) || {}));
        } else {
            // A random photo, full-screen Floyd–Steinberg dithered to the theme's
            // ink/paper, with a random excerpt from its article and a bg-colour
            // ShZh mark tucked in the bottom-right corner.
            const css = getComputedStyle(document.body);
            const inkC = css.color, paperC = css.backgroundColor;
            const toRGB = (s) => (s.match(/\d+/g) || [0, 0, 0]).map(Number).slice(0, 3);
            const ink = toRGB(inkC), paper = toRGB(paperC);
            const cv = document.getElementById("dither");
            const ctx = cv.getContext("2d", { willReadFrequently: true });
            const capEl = document.getElementById("ss-caption");
            const markEl = document.getElementById("ss-mark");

            const loadImage = (src) => new Promise((res, rej) => {
                const im = new Image(); im.onload = () => res(im); im.onerror = rej; im.src = src;
            });

            // bg-colour ShZh in the corner: recolour the logo's internal fill.
            (async () => {
                try {
                    const svg = (await (await fetch("/logo/shzh.svg")).text())
                        .replace(/fill:\s*#000000/gi, "fill:" + paperC)
                        .replace(/<title>[\s\S]*?<\/title>/i, "");
                    markEl.innerHTML = svg;
                } catch (_) { /* mark is optional */ }
            })();

            const dither = (im) => {
                const w = cv.width = innerWidth, h = cv.height = innerHeight;
                ctx.fillStyle = paperC; ctx.fillRect(0, 0, w, h);
                const scale = Math.max(w / im.width, h / im.height);   // cover-fit
                const dw = im.width * scale, dh = im.height * scale;
                ctx.drawImage(im, (w - dw) / 2, (h - dh) / 2, dw, dh);

                const img = ctx.getImageData(0, 0, w, h), d = img.data;
                const g = new Float32Array(w * h);
                for (let i = 0; i < w * h; i++) {
                    // luminance, nudged for a touch more contrast
                    let v = (0.299 * d[i * 4] + 0.587 * d[i * 4 + 1] + 0.114 * d[i * 4 + 2]) / 255;
                    g[i] = Math.min(1, Math.max(0, (v - 0.5) * 1.15 + 0.5));
                }
                // Floyd–Steinberg error diffusion to 1 bit.
                for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
                    const i = y * w + x, old = g[i], nv = old < 0.5 ? 0 : 1, err = old - nv;
                    g[i] = nv;
                    if (x + 1 < w) g[i + 1] += err * 7 / 16;
                    if (y + 1 < h) {
                        if (x > 0) g[i + w - 1] += err * 3 / 16;
                        g[i + w] += err * 5 / 16;
                        if (x + 1 < w) g[i + w + 1] += err * 1 / 16;
                    }
                }
                for (let i = 0; i < w * h; i++) {
                    const c = g[i] >= 0.5 ? paper : ink, k = i * 4;
                    d[k] = c[0]; d[k + 1] = c[1]; d[k + 2] = c[2]; d[k + 3] = 255;
                }
                ctx.putImageData(img, 0, 0);
            };

            const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
            // Show the caption in the visitor's chosen language (falling back to English).
            if (lang === "he") capEl.dir = "rtl";
            if (lang === "gt") capEl.style.fontFamily = "'FairfaxHD', var(--font-body, serif)";

            (async () => {
                let data = { photos: [], articles: {} };
                try { data = await (await fetch("/screensaver/photos.json")).json(); } catch (_) {}
                const photos = data.photos || [];
                if (!photos.length) { ctx.fillStyle = paperC; ctx.fillRect(0, 0, innerWidth, innerHeight); return; }

                const shuffle = photos.slice().sort(() => Math.random() - 0.5);
                let idx = 0;
                const show = async () => {
                    const p = shuffle[idx % shuffle.length];
                    const art = (data.articles && data.articles[p.slug]) || {};
                    try { dither(await loadImage(p.src)); } catch (_) { return; }
                    capEl.textContent = "";
                    const exs = forLang(art.excerpts) || [];
                    const title = forLang(art.titles);
                    const ex = exs.length ? pick(exs) : "";
                    if (ex) {
                        const bq = document.createElement("blockquote"); bq.textContent = ex; capEl.appendChild(bq);
                        if (title) { const fc = document.createElement("figcaption"); fc.textContent = "— " + title; capEl.appendChild(fc); }
                        capEl.style.display = "";
                    } else { capEl.style.display = "none"; }
                };
                // The e-ink poster is a single still — one photo, no cycling. It only
                // re-renders to re-fit the dither if the window is resized.
                await show();
                addEventListener("resize", show);
            })();
        }

        const exit = () => { location.href = "/"; };
        addEventListener("click", exit);
        addEventListener("keydown", exit);
    })();
    </script>
</body>
</html>
