<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>◈ screensaver</title>
    <link rel="icon" href="/logo/favicon.svg">
    <script src="/scripts/theme-loader.js"></script>
    <link rel="stylesheet" href="/styles/pelmeni2025.css">
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg-color); cursor: none; }
        #hint { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 99;
            font-family: var(--font-body, serif); font-size: 12px; color: var(--text-color); opacity: 0.5;
            letter-spacing: 1px; user-select: none; }

        /* --- LCD: 25 logo.canvas windows bouncing around (kept compact/square) --- */
        #lcd-field { position: fixed; inset: 0; }
        .ss-logo { position: fixed; top: 0; left: 0; width: 88px; will-change: transform; }
        .ss-logo .title-bar { height: 18px; font-size: 9px; padding: 0 4px; }
        .ss-logo .title-bar .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ss-logo-body { padding: 7px; display: flex; justify-content: center; }
        .ss-logo-body img { width: 58px; height: 58px; }

        /* --- E-INK: a random photo from a photo article, redrawn as a halftone
               mosaic built out of the ShZh logo (ink on background). --- */
        #poster { position: fixed; inset: 0; }
        #mosaic { position: absolute; inset: 0; width: 100%; height: 100%; }

        body.mode-lcd #poster { display: none; }
        body.mode-eink #lcd-field { display: none; }
    </style>
</head>
<body>
    <div id="lcd-field"></div>

    <div id="poster">
        <canvas id="mosaic"></canvas>
    </div>

    <div id="hint">click or press any key to exit</div>

    <script>
    (function () {
        const eink = document.documentElement.classList.contains("eink-mode");
        document.body.classList.add(eink ? "mode-eink" : "mode-lcd");
        const reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (!eink) {
            // 25 mini logo.canvas windows caroming off the walls and each other.
            const field = document.getElementById("lcd-field"), N = 25, items = [];
            for (let i = 0; i < N; i++) {
                const el = document.createElement("div");
                el.className = "window ss-logo";
                el.innerHTML = '<div class="title-bar"><span class="title">❈ logo.canvas</span></div><div class="ss-logo-body"><img src="/logo/shzh.svg" alt=""></div>';
                field.appendChild(el);
                const w = el.offsetWidth, h = el.offsetHeight;
                const sp = reduce ? 0 : 2.4;
                items.push({ el, w, h,
                    x: Math.random() * Math.max(1, innerWidth - w),
                    y: Math.random() * Math.max(1, innerHeight - h),
                    vx: (Math.random() * 2 - 1) * sp || 1.6, vy: (Math.random() * 2 - 1) * sp || 1.6 });
                el.style.transform = "translate(" + items[i].x + "px," + items[i].y + "px)";
            }
            if (!reduce) (function step() {
                for (const it of items) {
                    it.x += it.vx; it.y += it.vy;
                    if (it.x <= 0) { it.x = 0; it.vx = Math.abs(it.vx); } else if (it.x + it.w >= innerWidth) { it.x = innerWidth - it.w; it.vx = -Math.abs(it.vx); }
                    if (it.y <= 0) { it.y = 0; it.vy = Math.abs(it.vy); } else if (it.y + it.h >= innerHeight) { it.y = innerHeight - it.h; it.vy = -Math.abs(it.vy); }
                }
                for (let i = 0; i < N; i++) for (let j = i + 1; j < N; j++) {
                    const a = items[i], b = items[j];
                    if (a.x >= b.x + b.w || a.x + a.w <= b.x || a.y >= b.y + b.h || a.y + a.h <= b.y) continue;
                    const ox = Math.min(a.x + a.w - b.x, b.x + b.w - a.x), oy = Math.min(a.y + a.h - b.y, b.y + b.h - a.y);
                    if (ox < oy) { const t = a.vx; a.vx = b.vx; b.vx = t; const s = a.x < b.x ? 1 : -1; a.x -= s * ox / 2; b.x += s * ox / 2; }
                    else { const t = a.vy; a.vy = b.vy; b.vy = t; const s = a.y < b.y ? 1 : -1; a.y -= s * oy / 2; b.y += s * oy / 2; }
                }
                for (const it of items) it.el.style.transform = "translate(" + it.x.toFixed(1) + "px," + it.y.toFixed(1) + "px)";
                requestAnimationFrame(step);
            })();
        } else {
            // A random photo from a photo article, redrawn as a halftone mosaic of
            // ShZh logos: each cell stamps the logo, sized by how dark the photo is
            // there (bigger = darker). Ink on background, so it stays e-ink friendly.
            const css = getComputedStyle(document.body);
            const text = css.color, bg = css.backgroundColor;
            const cv = document.getElementById("mosaic");
            const ctx = cv.getContext("2d");

            // The logo, tinted to the theme's text colour, ready to stamp at any size.
            const loadLogo = async () => {
                try {
                    const svg = (await (await fetch("/logo/shzh.svg")).text())
                        .replace(/fill:\s*#000000/gi, "fill:" + text)
                        .replace(/<title>[\s\S]*?<\/title>/i, "");
                    const img = new Image();
                    img.src = "data:image/svg+xml," + encodeURIComponent(svg);
                    await img.decode();
                    return img;
                } catch (_) { return null; }
            };

            const loadImage = (src) => new Promise((res, rej) => {
                const im = new Image();
                im.onload = () => res(im); im.onerror = rej; im.src = src;
            });

            // Sample the photo (cover-fit to the screen) onto a tiny grid and read
            // each cell's luminance.
            const sampleGrid = (im, cols, rows) => {
                const off = document.createElement("canvas");
                off.width = cols; off.height = rows;
                const octx = off.getContext("2d");
                const scale = Math.max(cols / im.width, rows / im.height);
                const dw = im.width * scale, dh = im.height * scale;
                octx.drawImage(im, (cols - dw) / 2, (rows - dh) / 2, dw, dh);
                const px = octx.getImageData(0, 0, cols, rows).data;
                const lum = new Float32Array(cols * rows);
                for (let i = 0; i < cols * rows; i++) {
                    const r = px[i * 4], g = px[i * 4 + 1], b = px[i * 4 + 2];
                    lum[i] = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                }
                return lum;
            };

            const draw = (im, logo) => {
                const w = cv.width = innerWidth, h = cv.height = innerHeight;
                const cell = Math.max(16, Math.round(Math.min(w, h) / 28)); // ~28 logos on the short edge
                const cols = Math.ceil(w / cell), rows = Math.ceil(h / cell);
                ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);
                const lum = sampleGrid(im, cols, rows);

                // Auto-levels: stretch the photo's 4th–96th luminance percentiles to the
                // full range so every picture uses the whole ink scale (they're not all
                // bright). Then a brightening gamma opens the midtones back up.
                const sorted = Float32Array.from(lum).sort();
                const lo = sorted[Math.floor(sorted.length * 0.04)];
                const hi = sorted[Math.floor(sorted.length * 0.96)] || 1;
                const span = Math.max(0.001, hi - lo);

                for (let gy = 0; gy < rows; gy++) for (let gx = 0; gx < cols; gx++) {
                    let L = Math.min(1, Math.max(0, (lum[gy * cols + gx] - lo) / span));
                    L = Math.pow(L, 0.72);                  // lift midtones toward the highlights
                    const d = 1 - L;                        // darkness → stamp coverage
                    if (d < 0.12) continue;                 // leave the highlights blank
                    const size = cell * (0.2 + 1.25 * d);   // darker → bigger stamp (overfills when black)
                    const cx = gx * cell + cell / 2, cy = gy * cell + cell / 2;
                    if (logo) ctx.drawImage(logo, cx - size / 2, cy - size / 2, size, size);
                    else { ctx.fillStyle = text; ctx.beginPath(); ctx.arc(cx, cy, size * 0.4, 0, 6.2832); ctx.fill(); }
                }
            };

            (async () => {
                const logo = await loadLogo();
                let photos = [];
                try { photos = await (await fetch("/screensaver/photos.json")).json(); } catch (_) {}
                if (!photos.length) { ctx.fillStyle = bg; ctx.fillRect(0, 0, innerWidth, innerHeight); return; }

                const shuffle = photos.slice().sort(() => Math.random() - 0.5);
                let idx = 0;
                const show = async () => {
                    const p = shuffle[idx % shuffle.length];
                    try { draw(await loadImage(p.src), logo); } catch (_) {}
                };
                await show();
                // On a motion-ok screen, drift through the gallery; otherwise hold one.
                if (!reduce) setInterval(() => { idx++; show(); }, 11000);
                addEventListener("resize", show);
            })();
        }

        const exit = () => { location.href = "/"; };
        addEventListener("click", exit);
        addEventListener("keydown", exit);
    })();
    </script>
</body>
</html>
