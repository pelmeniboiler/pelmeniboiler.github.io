<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <link id="dynamic-favicon" rel="icon" href="/logo/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <link rel="preload" href="/styles/fonts/FrankRuhl.ttf" as="font" type="font/ttf" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>⚠ 404.error</title>
    <!-- Absolute paths: this page is served for ANY missing URL (e.g. /boogaga/),
         so relative asset paths would 404 at depth and strip the theme + decor. -->
    <script src="/scripts/theme-loader.js"></script>
    <link rel="stylesheet" href="/styles/pelmeni2025.css">
</head>
<body>

    <div class="window" style="top: 30%; left: 40%; width: 350px; z-index: 10;">
        <div class="title-bar">
            <span class="title" data-key="win_404_title"><span class="symbol">⚠</span> 404.error</span>
            <button class="close-btn" onclick="window.location.href='/'">&times;</button>
        </div>
        <div class="content" style="text-align: center;">
            <h1 data-key="404_h1" style="font-size: 4em; margin-bottom: 0.1em;">⚠ 404 ⚠</h1>
            <p data-key="404_p" style="font-size: 1.2em;">The requested file could not be located.</p>
            <p style="margin-top: 20px;">
                <a href="/" class="normal-btn" data-key="404_return_link">⮌ Return to Main</a>
            </p>
        </div>
    </div>

    <div id="settings-module-placeholder"></div>
    <div id="start-menu-module-placeholder"></div>

    <script src="/scripts/module-loader.js" defer></script>

    <!-- When motion is welcome (not e-ink, not reduce-motion), the 404 window
         skitters away from the cursor — you have to corner it to click Return. -->
    <script>
    (function () {
        const win = document.querySelector('.window');
        const eink = document.documentElement.classList.contains('eink-mode');
        const reduce = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!win || eink || reduce) return;
        const r0 = win.getBoundingClientRect();
        let x = r0.left, y = r0.top;
        Object.assign(win.style, { position: 'fixed', left: x + 'px', top: y + 'px', transform: 'none',
            transition: 'left .12s ease-out, top .12s ease-out', margin: '0' });
        addEventListener('mousemove', (e) => {
            const r = win.getBoundingClientRect();
            const dx = (r.left + r.width / 2) - e.clientX, dy = (r.top + r.height / 2) - e.clientY;
            const d = Math.hypot(dx, dy), R = 200;
            if (d >= R || d === 0) return;
            const push = (R - d) * 0.6;
            x = Math.max(6, Math.min(innerWidth - r.width - 6, x + (dx / d) * push));
            y = Math.max(6, Math.min(innerHeight - r.height - 6, y + (dy / d) * push));
            win.style.left = x + 'px'; win.style.top = y + 'px';
        });
    })();
    </script>

</body>
</html>
