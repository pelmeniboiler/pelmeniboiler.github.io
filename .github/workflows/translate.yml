name: Auto-translate stale localizations

# Manually triggered (Actions tab → run workflow). Drafts translations for STALE
# keys only — existing translations whose English changed — via the Gemini API,
# validates them (HTML tags, Graflect glyphs), commits the result back to main.
# In-progress prefixes are excluded in build/tl-auto.mjs. The API key lives in
# repository secrets as GEM_API_KEY: never in the repo, masked in logs, and not
# available to fork PRs.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Draft translations for stale keys
        env:
          GEM_API_KEY: ${{ secrets.GEM_API_KEY }}
        run: npm run tl:auto

      - name: Validate Graflect
        run: npm run lint:gt

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add localization/
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "Auto-translate stale localizations (Gemini draft; validated)"
          git push
